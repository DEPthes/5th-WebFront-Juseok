<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DEPth Web-Front 2week</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="page">
      <img class="phone-preview" src="./assets/phone.svg" alt="Tnovel 앱 화면 미리보기" />

      <section class="login-area" aria-label="로그인">
        <div class="login-card">
          <img class="logo" src="./assets/logo.svg" alt="Travel" />

          <form class="login-form">
            <label class="input-box">
              <img src="./assets/mail.svg" alt="" />
              <input type="text" placeholder="전화번호, 사용자 이름 또는 이메일" />
            </label>

            <label class="input-box">
              <img src="./assets/lock.svg" alt="" />
              <input type="password" placeholder="비밀번호" />
            </label>

            <button class="login-button" type="submit">로그인</button>

            <div class="divider">or</div>

            <button class="kakao-button" type="button">
                <img src="./assets/kakao-logo.svg" alt="" />
                카카오 로그인
            </button>

          </form>


          <a class="password-link" href="#">비밀번호를 잊으셨나요?</a>
        </div>

        <div class="join-card">
          <span>계정이 없으신가요?&nbsp;</span>
          <a href="#">가입하기</a>
        </div>

        <div class="download-area">
          <p>앱을 다운로드 하세요.</p>
          <div class="store-buttons">
            <button type="button" aria-label="Google Play에서 다운로드">
              <img src="./assets/download-google-play.svg" alt="Google Play" />
            </button>
            <button type="button" aria-label="App Store에서 다운로드">
              <img src="./assets/download-app-store.svg" alt="App Store" />
            </button>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
