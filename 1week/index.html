<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DEPth 1week submission</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <header class="top-nav">
        <h1 class="top-nav__title">天眞浪漫</h1>
        <div class="top-nav__right">
          <img class="top-nav__saero" src="./assets/saero_logo.svg" />
          <img class="top-nav__arrow" src="./assets/arrow_right.svg" />
        </div>
      </header>

      <main class="main-content">
        <section class="main-content__banner">
          <img class="main-content__banner-image" src="./assets/Banner.svg" />
        </section>

        <section class="notice">
          <button class="notice__button" type="button">
            <span class="notice__left">
              <img src="./assets/alarm.svg" />
              <span>공지사항</span>
            </span>
            <img src="./assets/arrow_right.svg" />
          </button>
        </section>

        <section class="artist">
          <img
            class="artist__poster"
            src="./assets/artist.png"
            alt="가수 포스터"
          />

          <article class="artist-card">
            <img
              class="artist-card__corner artist-card__corner--tl"
              src="./assets/border.svg"
              alt=""
              aria-hidden="true"
            />
            <img
              class="artist-card__corner artist-card__corner--tr"
              src="./assets/border.svg"
              alt=""
              aria-hidden="true"
            />
            <img
              class="artist-card__corner artist-card__corner--bl"
              src="./assets/border.svg"
              alt=""
              aria-hidden="true"
            />
            <img
              class="artist-card__corner artist-card__corner--br"
              src="./assets/border.svg"
              alt=""
              aria-hidden="true"
            />

            <div class="artist-card__day">DAY 2</div>
            <img
              class="artist-card__divider"
              src="./assets/artistcard_divider.svg"
            />
            <div class="artist-card__name">볼빨간사춘기</div>
          </article>
        </section>
      </main>

      <footer class="footer">
        <div class="footer__logo-box">
          <img class="footer__logo" src="./assets/DEPth_logo.svg" alt="DEPth" />
        </div>

        <div class="footer__icons">
          <button class="footer__icon" type="button" aria-label="Link">
            <img src="./assets/link.svg" alt="" aria-hidden="true" />
          </button>
          <button class="footer__icon" type="button" aria-label="GitHub">
            <img src="./assets/GitHub.svg" alt="" aria-hidden="true" />
          </button>
          <button class="footer__icon" type="button" aria-label="Instagram">
            <img src="./assets/Instagram.svg" alt="" aria-hidden="true" />
          </button>
          <button class="footer__icon" type="button" aria-label="Email">
            <img src="./assets/Email.svg" alt="" aria-hidden="true" />
          </button>
        </div>

        <img
          class="footer__divider"
          src="./assets/Divider.svg"
          alt=""
          aria-hidden="true"
        />

        <p class="footer__copyright">
          Copyright © DEPth MJU.<br />
          All Rights Reserved
        </p>
      </footer>
    </div>
  </body>
</html>
