<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DEPth 1week submission</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <!-- 헤더 및 네비게이션 바 -->
      <header class="top-nav">
        <h1 class="top-nav__title">天眞浪漫</h1>
        <div class="top-nav__right">
          <img class="top-nav__saero" src="./assets/saero_logo.svg" />
          <img class="top-nav__arrow" src="./assets/arrow_right.svg" />
        </div>
      </header>

      <!-- 메인 콘텐츠 -->
      <main class="main-content">
        <!-- 축제 소개 배너 -->
        <section class="main-content__banner">
          <img class="main-content__banner-image" src="./assets/Banner.svg" />
        </section>

        <!-- 공지사항 버튼 -->
        <section class="notice">
          <button class="notice__button" type="button">
            <span class="notice__left">
              <img src="./assets/alarm.svg" />
              <span>공지사항</span>
            </span>
            <img src="./assets/arrow_right.svg" />
          </button>
        </section>

        <!-- 축제 초청 연예인 소개 페이지 -->
        <section class="artist">
          <img class="artist__poster" src="./assets/artist.png" />

          <article class="artist-card">
            <img
              class="artist-card__corner artist-card__corner--tl"
              src="./assets/border.svg"
            />
            <img
              class="artist-card__corner artist-card__corner--tr"
              src="./assets/border.svg"
            />
            <img
              class="artist-card__corner artist-card__corner--bl"
              src="./assets/border.svg"
            />
            <img
              class="artist-card__corner artist-card__corner--br"
              src="./assets/border.svg"
            />

            <div class="artist-card__day">DAY 2</div>
            <img
              class="artist-card__divider"
              src="./assets/artistcard_divider.svg"
            />
            <div class="artist-card__name">볼빨간사춘기</div>
          </article>
        </section>
      </main>

      <!-- 푸터 -->
      <footer class="footer">
        <div class="footer__logo-box">
          <img class="footer__logo" src="./assets/DEPth_logo.svg" />
        </div>

        <div class="footer__icons">
          <button class="footer__icon" type="button">
            <img src="./assets/link.svg" />
          </button>
          <button class="footer__icon" type="button">
            <img src="./assets/GitHub.svg" />
          </button>
          <button class="footer__icon" type="button">
            <img src="./assets/Instagram.svg" />
          </button>
          <button class="footer__icon" type="button">
            <img src="./assets/Email.svg" />
          </button>
        </div>

        <img class="footer__divider" src="./assets/Divider.svg" />

        <p class="footer__copyright">
          Copyright © DEPth MJU.<br />
          All Rights Reserved
        </p>
      </footer>
    </div>
  </body>
</html>
